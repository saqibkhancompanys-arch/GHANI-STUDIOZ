<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ghani Studioz — Premium Client Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0713;
    --bg-glow: radial-gradient(circle at 50% -20%, #2f1747 0%, #0b0713 70%);
    --card: rgba(30, 21, 44, 0.45);
    --card-border: rgba(138, 79, 201, 0.15);
    --card-hover-border: rgba(232, 167, 73, 0.5);
    --gold: #e8a749;
    --gold-glow: rgba(232, 167, 73, 0.15);
    --purple: #8a4fc9;
    --purple-glow: rgba(138, 79, 201, 0.2);
    --text: #f5f0fb;
    --text-dim: #9c8fb2;
    --line: rgba(255, 255, 255, 0.06);
    --green: #4ade80;
    --red: #f27272;
    --amber: #e8a749;
  }
  *{ box-sizing:border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
  body{ margin:0; background: var(--bg-glow); background-attachment: fixed; color:var(--text); font-family:'Inter', sans-serif; min-height:100vh; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
  .brand-title{ text-align:center; font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:58px; letter-spacing:4px; padding:30px 20px 6px; background:linear-gradient(135deg, #f4c884, var(--gold) 45%, #c084fc); -webkit-background-clip:text; background-clip:text; color:transparent; text-shadow: 0 0 30px rgba(138, 79, 201, 0.2); }
  @media (max-width:640px){ .brand-title{ font-size:36px; letter-spacing:2px; } }
  .sprocket-bar{ height:20px; display:flex; align-items:center; gap:18px; padding:0 24px; background:rgba(10, 6, 16, 0.8); backdrop-filter: blur(5px); overflow:hidden; border-bottom:1px solid var(--line); }
  .sprocket-bar .hole{ width:12px; height:8px; border-radius:1px; background:var(--gold); opacity:0.35; flex:none; }
  header{ padding:36px 32px 10px; max-width:1180px; margin:0 auto; }
  h1{ font-family:'Space Grotesk', sans-serif; font-size:48px; font-weight:700; margin:0 0 6px; letter-spacing:-1px; }
  h1 span{ color:var(--gold); text-shadow: 0 0 15px rgba(232,167,73,0.2); }
  .stats{ display:grid; grid-template-columns:repeat(2,1fr); gap:16px; max-width:1180px; margin:10px auto 25px; padding:0 32px; }
  .stat{ background: var(--card); backdrop-filter: blur(10px); border: 1px solid var(--card-border); border-radius:16px; padding:20px; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  .stat::before { content: ''; position: absolute; top:0; left:0; width: 4px; height: 100%; background: var(--purple); }
  .stat-gold::before { background: var(--gold); }
  .stat .num{ font-family:'Space Grotesk', sans-serif; font-size:36px; font-weight:700; line-height: 1.1; }
  .stat .lbl{ font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; margin-top:6px; font-weight: 600; }
  main{ max-width:1180px; margin:0 auto; padding:10px 32px 80px; }
  .toolbar{ display:flex; gap:12px; margin-bottom:28px; flex-wrap:wrap; align-items:center; background: rgba(20, 14, 30, 0.4); padding: 12px; border-radius: 14px; border: 1px solid var(--line); backdrop-filter: blur(10px); }
  input, select, textarea{ font-family:'Inter', sans-serif; background: rgba(10, 6, 16, 0.6); border:1px solid var(--card-border); color:var(--text); border-radius:10px; padding:12px 16px; font-size:14px; outline:none; }
  input:focus, select:focus, textarea:focus{ border-color:var(--gold); box-shadow:0 0 15px rgba(232, 167, 73, 0.15); }
  #searchBox{ flex:2; min-width:240px; }
  .filter-chips { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .chip { padding: 8px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); color: var(--text-dim); }
  .chip.active { background: var(--purple-glow); border-color: var(--purple); color: var(--text); box-shadow: 0 0 10px rgba(138, 79, 201, 0.3); }
  .btn{ font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:14px; border:none; border-radius:10px; padding:12px 22px; cursor:pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
  .btn:hover{ transform:translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
  .btn-primary{ background:linear-gradient(135deg, var(--gold), #d98f2e); color:#120c03; }
  .btn-ghost{ background:rgba(255,255,255,0.02); color:var(--text-dim); border:1px solid var(--card-border); }
  .btn-danger{ background:transparent; color:var(--red); border:1px solid rgba(242,114,114,0.2); }
  .btn-small{ padding:8px 14px; font-size:12px; border-radius: 8px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(330px, 1fr)); gap:20px; }
  .card{ background: var(--card); backdrop-filter: blur(15px); border: 1px solid var(--card-border); border-radius:20px; padding:22px; position:relative; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
  .cid{ font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--gold); letter-spacing:1.5px; font-weight: 700; }
  .cname{ font-family:'Space Grotesk', sans-serif; font-size:21px; font-weight:700; margin:4px 0 0; letter-spacing: -0.3px; }
  .tag{ display:inline-block; font-size:10px; font-weight:700; padding:4px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:1px; }
  .tag-active{ background:rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.25); color:var(--green); }
  .tag-completed{ background:rgba(138,79,201,0.15); border: 1px solid rgba(138,79,201,0.3); color:var(--purple); }
  .tag-hold{ background:rgba(232,167,73,0.1); border: 1px solid rgba(232,167,73,0.25); color:var(--gold); }
  .tag-cancelled{ background:rgba(242,114,114,0.1); border: 1px solid rgba(242,114,114,0.25); color:var(--red); }
  .field-row{ display:flex; justify-content:space-between; align-items: center; font-size:13px; padding:8px 0; border-bottom:1px dashed rgba(255,255,255,0.04); }
  .field-row .k{ color:var(--text-dim); }
  .field-row .v{ font-weight:500; text-align:right; }
  .social-link { color: var(--gold); text-decoration: none; font-weight: 600; }
  .card-actions{ display:flex; gap:8px; margin-top:16px; }
  .videos-btn{ width:100%; margin-top:14px; font-family:'Space Grotesk', sans-serif; font-weight:700; font-size:13px; background:rgba(138,79,201,0.08); border:1px solid var(--card-border); color:var(--purple); border-radius:10px; padding:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .videos-btn .vcount{ background:var(--purple); color:white; font-size:11px; padding:2px 8px; border-radius:20px; }
  .overlay{ position:fixed; inset:0; background:rgba(7, 4, 11, 0.85); backdrop-filter:blur(8px); display:none; align-items:center; justify-content:center; z-index:100; padding:20px; }
  .overlay.show{ display:flex; }
  .modal{ background: var(--bg); border:1px solid var(--card-hover-border); border-radius:24px; width:100%; max-width:640px; max-height:88vh; overflow-y:auto; padding:30px; }
</style>
</head>
<body>

<div id="loginScreen" style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">
  <div style="width:100%; max-width:380px; background:var(--card); border:1px solid var(--card-border); border-radius:24px; padding:40px 32px;">
    <div style="text-align:center; font-family:'Space Grotesk'; font-weight:700; font-size:32px; color:var(--gold); margin-bottom:28px;">GHANI STUDIOZ</div>
    <label style="display:block; margin-bottom:16px; font-size:13px; color:var(--text-dim);">Email <input id="loginEmail" type="email" style="width:100%; margin-top:8px;"></label>
    <label style="display:block; margin-bottom:24px; font-size:13px; color:var(--text-dim);">Password <input id="loginPassword" type="password" style="width:100%; margin-top:8px;"></label>
    <button class="btn btn-primary" id="loginBtn" style="width:100%;">Log In</button>
    <div id="loginError" style="color:var(--red); font-size:13px; margin-top:16px; text-align:center; display:none;"></div>
  </div>
</div>

<div id="appContent" style="display:none;">
  <div class="brand-title">GHANI STUDIOZ</div>
  <div class="sprocket-bar" id="sprocketBar"></div>
  <header>
    <h1>Client <span>Portal</span></h1>
    <button class="btn btn-ghost btn-small" id="logoutBtn">Log Out</button>
  </header>
  <div class="stats">
    <div class="stat"><div class="num" id="statTotal">0</div><div class="lbl">Total Clients</div></div>
    <div class="stat stat-gold"><div class="num" id="statActive">0</div><div class="lbl">Active Campaigns</div></div>
  </div>
  <main>
    <div class="grid" id="clientGrid"></div>
  </main>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const firebaseConfig = { apiKey: "AIzaSyA66SQH26qaRXXPCJdeif26uxkKFSHT3lc", authDomain: "ghani-studioz.firebaseapp.com", projectId: "ghani-studioz", storageBucket: "ghani-studioz.firebasestorage.app", messagingSenderId: "651062801971", appId: "1:651062801971:web:5b34cba89803e0617b9546" };
  
  const auth = getAuth(initializeApp(firebaseConfig));
  let inactivityTimer = null;

  // Inactivity Logic
  const resetTimer = () => {
    clearTimeout(inactivityTimer);
    inactivityTimer = setTimeout(() => {
      if(auth.currentUser) signOut(auth).then(() => window.location.reload());
    }, 15 * 60 * 1000);
  };

  ['mousemove', 'mousedown', 'keydown', 'scroll', 'click'].forEach(evt => document.addEventListener(evt, resetTimer));

  // Login Logic
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPassword').value;
    try {
      await setPersistence(auth, browserSessionPersistence);
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) { document.getElementById('loginError').style.display = 'block'; }
  });

  document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, (user) => {
    if(user) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('appContent').style.display = 'block';
      resetTimer();
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('appContent').style.display = 'none';
      clearTimeout(inactivityTimer);
    }
  });
</script>
</body>
</html>
